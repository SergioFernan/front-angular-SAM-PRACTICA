<section class="login-layout">
  <div class="glass-card">
    <div class="login-header">
      <h1 class="title">Acceso al <span class="highlight">Escenario</span></h1>
      <p class="subtitle">Descubre los mejores eventos musicales cerca de ti.</p>
    </div>

    <div class="login-tabs">
      <button 
        type="button" 
        class="tab-btn" 
        [class.active]="selectedTab === 'individual'" 
        (click)="setTab('individual')"
      >
        Persona Natural
      </button>
      <button 
        type="button" 
        class="tab-btn" 
        [class.active]="selectedTab === 'business'" 
        (click)="setTab('business')"
      >
        Negocio / Evento
      </button>
    </div>

    <form class="login-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          class="form-control" 
          [placeholder]="selectedTab === 'individual' ? 'rockstar@banda.com' : 'organizacion@sam-eventos.com'" 
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          class="form-control" 
          placeholder="••••••••" 
          autocomplete="current-password"
        />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit">
          {{ selectedTab === 'individual' ? 'Entrar al Backstage' : 'Acceso de Organizador' }}
        </button>
      </div>

      <div class="form-footer">
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>
</section>
